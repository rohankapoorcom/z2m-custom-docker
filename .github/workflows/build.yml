name: Build Zigbee2MQTT with Custom Converters

on:
  workflow_dispatch:
    inputs:
      converters_repo:
        description: "zigbee-herdsman-converters repo (owner/repo)"
        required: true
        default: "Koenkk/zigbee-herdsman-converters"
      converters_ref:
        description: "Converters branch or tag"
        required: true
        default: "master"
      z2m_repo:
        description: "Zigbee2MQTT repo (owner/repo)"
        required: true
        default: "Koenkk/zigbee2mqtt"
      z2m_ref:
        description: "Zigbee2MQTT branch or tag"
        required: true
        default: "master"
      docker_tag:
        description: "Local Docker image tag"
        required: true
        default: "zigbee2mqtt:custom-converters"
      push_ghcr:
        description: "Push image to GitHub Container Registry"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v6

      - name: Checkout zigbee-herdsman-converters
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.converters_repo }}
          ref: ${{ inputs.converters_ref }}
          path: zigbee-herdsman-converters

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build Docker image
        env:
          CONVERTERS_DIR: ${{ github.workspace }}/zigbee-herdsman-converters
          Z2M_REPO: ${{ inputs.z2m_repo }}
          Z2M_REF: ${{ inputs.z2m_ref }}
          DOCKER_TAG: ${{ inputs.docker_tag }}
        run: ./build.sh

      - name: Login to GHCR
        if: ${{ inputs.push_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to GHCR
        if: ${{ inputs.push_ghcr }}
        run: |
          GHCR_TAG="ghcr.io/${{ github.repository_owner }}/zigbee2mqtt-custom:$(date +%Y%m%d-%H%M%S)"
          docker tag "${{ inputs.docker_tag }}" "$GHCR_TAG"
          docker push "$GHCR_TAG"
          echo "Pushed: $GHCR_TAG" >> "$GITHUB_STEP_SUMMARY"
